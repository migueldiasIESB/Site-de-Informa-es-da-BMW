<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="icon" type="img/png" href="../Icone/Logo-bmw-vector-transparent-PNG.png">
</head>
<body>
    <h1 style="background-color:rgb(3, 3, 77); color: aliceblue ; padding: 40px;">
        Formulário
    </h1>
    <fieldset>
    <legend style="background-color: black; color: aliceblue;">Formulário Padrão</legend>
    <form action="arquivo.sql" method="post">
        <p>Nome: <input type="text" name="Nome" placeholder="Digite seu nome" size="30"required /></p>    
        <p>Telefone: <input type="tel" placeholder="(00)00000-0000" maxlength="14" size="10"required /></p>
        <p>Data de Nascimento: <input type="date"required /></p>
        <p>Senha: <input type="password" maxlength="8" size="10"required /></p>
        <p>Email: <input type="email"required /></p>
        <p>Idade <input type="number"required /></p>
        <p>Comentário: <textarea rows="10" cols="100"></textarea></p>
    <p>
        <input type="radio" name="Estado" value="DF" required/>DF
        <input type="radio" name="Estado" value="MG" />MG
        <input type="radio" name="Estado" value="RJ" />RJ
        <input type="radio" name="Estado" value="SP"/>SP
        <input type="radio" name="Estado" value="GO" />GO
        <input type="radio" name="Estado" value="TO" />TO
        <input type="radio" name="Estado" value="AM" />AM
        <input type="radio" name="Estado" value="PE" />PE
        <input type="radio" name="Estado" value="PA" />PA
        <input type="radio" name="Estado" value="RS" />RS

    </p>
    Países da América Latina
    <select required>
        <option value="">Selecione</option>
        <option value="Brasil">Brasil</option>
        <option value="Peru">Peru</option>
        <option value="Uruguai">Uruguai</option>
        <option value="Argentina">Argentina</option>
        <option value="Colômbia">Colômbia</option>
    </select>
    <p><input type="checkbox" required/>Aceito os termos</p>
    <p><input type="reset" name=""/></p>
    <p><input type="submit" name=""/></p>
    </form>
    </fieldset>
</body>
</html>
